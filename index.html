<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飲食記錄表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meal-card { border-left: 4px solid #3b82f6; transition: all 0.2s ease; }
        .total-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .loading-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 pb-20">

<div class="max-w-4xl mx-auto">
    <header class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">🥗 增肌同步日誌</h1>
            <p class="text-xs text-gray-500">ID: <span id="displayUID" class="font-mono text-blue-600 font-bold"></span></p>
        </div>
        <button onclick="toggleLibrary()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 shadow-md">管理食物庫</button>
    </header>

    <div id="statusMsg" class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-xs shadow-2xl z-50 flex items-center">
        <div class="w-2 h-2 bg-blue-400 rounded-full mr-2 loading-dot"></div>
        <span id="statusText">正在同步...</span>
    </div>

    <div class="total-card text-white p-6 rounded-2xl shadow-xl mb-6 grid grid-cols-3 gap-2 text-center">
        <div>
            <p class="text-gray-400 text-[10px] uppercase">Calories</p>
            <p id="totalCal" class="text-xl font-bold text-yellow-400">0</p>
            <p class="text-[9px] text-gray-500">Target: 2350</p>
        </div>
        <div>
            <p class="text-gray-400 text-[10px] uppercase">Protein</p>
            <p id="totalPro" class="text-xl font-bold text-blue-400">0</p>
            <p class="text-[9px] text-gray-500">Target: 110g</p>
        </div>
        <div>
            <p class="text-gray-400 text-[10px] uppercase">Carbs</p>
            <p id="totalCarb" class="text-xl font-bold text-green-400">0</p>
            <p class="text-[9px] text-gray-500">Target: 330g</p>
        </div>
    </div>

    <div id="librarySection" class="hidden mb-6 bg-white p-6 rounded-xl shadow-md border border-blue-50">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-blue-600">雲端常用清單</h2>
            <button onclick="toggleLibrary()" class="text-gray-400 hover:text-red-500 text-sm">✕ 隱藏</button>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <input type="text" id="libName" placeholder="名稱" class="border p-2 rounded text-sm">
            <input type="number" id="libCal" placeholder="熱量" class="border p-2 rounded text-sm">
            <input type="number" id="libPro" placeholder="蛋白" class="border p-2 rounded text-sm">
            <input type="number" id="libCarb" placeholder="碳水" class="border p-2 rounded text-sm">
        </div>
        <button onclick="saveToLibrary()" class="w-full bg-green-500 text-white py-2 rounded-lg font-bold hover:bg-green-600">儲存資料庫</button>
        <div class="mt-4 max-h-60 overflow-y-auto border-t pt-2" id="libraryList"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <script>
            ['早餐', '午餐', '下午茶', '晚餐'].forEach(meal => {
                document.write(`
                    <div class="bg-white p-4 rounded-xl shadow-sm meal-card border border-gray-50">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-bold text-gray-700">${meal}</h3>
                            <select onchange="addFromLibrary('${meal}', this)" class="border text-xs p-1 rounded bg-gray-50 outline-none w-28">
                                <option value="">+ 加入食物</option>
                            </select>
                        </div>
                        <ul id="list-${meal}" class="space-y-2 text-sm text-gray-600 min-h-[30px]"></ul>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="mt-12 flex justify-center gap-6">
        <button onclick="clearDailyLog()" class="text-gray-400 text-xs hover:text-red-500 underline">重置今日紀錄</button>
        <button onclick="changeUID()" class="text-gray-400 text-xs hover:text-blue-500 underline">更換帳號 ID</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwBpWyA2nE-1TRjQPGv7wqj2rW3OS2840vQph-Z2MC8MTscoK1cNNnzH_1bLWy5EK7ggw/exec"; 
    
    let UID = localStorage.getItem('muscle_tracker_uid');
    if (!UID) {
        UID = prompt("請輸入您的增肌帳號 ID：") || "default_user";
        localStorage.setItem('muscle_tracker_uid', UID);
    }
    document.getElementById('displayUID').innerText = UID;

    let foodLibrary = [];
    let dailyLog = { '早餐': [], '午餐': [], '下午茶': [], '晚餐': [] };

    function showStatus(msg) {
        const s = document.getElementById('statusMsg');
        document.getElementById('statusText').innerText = msg;
        s.classList.remove('hidden');
    }
    function hideStatus() {
        setTimeout(() => document.getElementById('statusMsg').classList.add('hidden'), 1500);
    }

    async function init() {
        const cachedLib = localStorage.getItem(`cache_${UID}_lib`);
        const cachedLog = localStorage.getItem(`cache_${UID}_log`);
        if (cachedLib) { foodLibrary = JSON.parse(cachedLib); updateLibraryUI(); }
        if (cachedLog) { dailyLog = JSON.parse(cachedLog); renderDailyLog(); updateTotals(); }

        showStatus("雲端同步中...");
        try {
            const response = await fetch(`${API_URL}?uid=${encodeURIComponent(UID)}`);
            const data = await response.json();
            foodLibrary = data.foodLibrary || [];
            dailyLog = data.dailyLog || { '早餐': [], '午餐': [], '下午茶': [], '晚餐': [] };
            localStorage.setItem(`cache_${UID}_lib`, JSON.stringify(foodLibrary));
            localStorage.setItem(`cache_${UID}_log`, JSON.stringify(dailyLog));
            updateLibraryUI();
            renderDailyLog();
            updateTotals();
            showStatus("同步完成");
        } catch (e) {
            showStatus("目前為離線模式");
        } finally { hideStatus(); }
    }

    function sync(type, data) {
        const cacheKey = type === 'saveLibrary' ? `cache_${UID}_lib` : `cache_${UID}_log`;
        localStorage.setItem(cacheKey, JSON.stringify(data));
        showStatus("正在雲端備份...");
        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ type, data, uid: UID })
        }).then(() => {
            showStatus("雲端已備份");
            hideStatus();
        }).catch(() => {
            showStatus("雲端備份失敗 (待連線)");
            hideStatus();
        });
    }

    function toggleLibrary() { document.getElementById('librarySection').classList.toggle('hidden'); }

    function saveToLibrary() {
        const name = document.getElementById('libName').value;
        const cal = parseFloat(document.getElementById('libCal').value) || 0;
        const pro = parseFloat(document.getElementById('libPro').value) || 0;
        const carb = parseFloat(document.getElementById('libCarb').value) || 0;
        if (!name) return;
        foodLibrary.push({ name, cal, pro, carb });
        updateLibraryUI();
        sync('saveLibrary', foodLibrary);
        ['libName', 'libCal', 'libPro', 'libCarb'].forEach(id => document.getElementById(id).value = '');
    }

    function updateLibraryUI() {
        const list = document.getElementById('libraryList');
        const selects = document.querySelectorAll('select');
        list.innerHTML = foodLibrary.map((f, i) => `
            <div class="flex justify-between items-center text-sm py-2 border-b border-gray-50 hover:bg-gray-50 px-2 rounded group">
                <span class="font-medium text-gray-700">${f.name} <span class="text-[10px] text-gray-400 font-normal">(${f.cal}k / P:${f.pro} / C:${f.carb})</span></span>
                <button onclick="deleteLibItem(${i})" class="text-red-300 hover:text-red-500 transition">✕</button>
            </div>
        `).join('');
        const opts = foodLibrary.map((f, i) => `<option value="${i}">${f.name}</option>`).join('');
        selects.forEach(s => s.innerHTML = '<option value="">+ 加入食物</option>' + opts);
    }

    function deleteLibItem(i) { 
        if(confirm('確定要從資料庫刪除嗎？')) {
            foodLibrary.splice(i, 1); updateLibraryUI(); sync('saveLibrary', foodLibrary); 
        }
    }

    function addFromLibrary(meal, select) {
        const idx = select.value;
        if (idx === "") return;
        dailyLog[meal].push({...foodLibrary[idx]});
        renderDailyLog(); updateTotals();
        sync('saveLog', dailyLog);
        select.value = "";
    }

    function renderDailyLog() {
        ['早餐', '午餐', '下午茶', '晚餐'].forEach(meal => {
            const list = document.getElementById(`list-${meal}`);
            list.innerHTML = (dailyLog[meal] || []).map((f, i) => `
                <li class="flex justify-between items-center bg-gray-50 p-2 rounded text-xs">
                    <span>${f.name} <span class="text-gray-400">(${f.cal}k)</span></span>
                    <button onclick="removeFromLog('${meal}', ${i})" class="text-gray-300 hover:text-red-500 font-bold">✕</button>
                </li>`).join('');
        });
    }

    function removeFromLog(meal, i) { dailyLog[meal].splice(i, 1); renderDailyLog(); updateTotals(); sync('saveLog', dailyLog); }

    function updateTotals() {
        let c = 0, p = 0, b = 0;
        Object.values(dailyLog).flat().forEach(f => { c += f.cal; p += f.pro; b += f.carb; });
        document.getElementById('totalCal').innerText = Math.round(c);
        document.getElementById('totalPro').innerText = Math.round(p);
        document.getElementById('totalCarb').innerText = Math.round(b);
    }

    function clearDailyLog() { if(confirm('重置紀錄？')) { dailyLog = { '早餐': [], '午餐': [], '下午茶': [], '晚餐': [] }; renderDailyLog(); updateTotals(); sync('saveLog', dailyLog); } }

    function changeUID() { const n = prompt("輸入新 ID：", UID); if(n && n!==UID){ localStorage.setItem('muscle_tracker_uid', n); location.reload(); } }

    init();
</script>
</body>
</html>
