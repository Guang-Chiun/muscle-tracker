<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💪 29.0kg 骨骼肌衝刺日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .meal-card { border-left: 4px solid #3b82f6; transition: all 0.2s ease; }
        .total-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .loading-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 pb-20">

<div class="max-w-4xl mx-auto">
    <header class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">🥗 增肌同步日誌</h1>
            <p class="text-[10px] text-gray-500">當前帳號：<span id="displayUID" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded font-bold"></span></p>
        </div>
        <button onclick="toggleLibrary()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700 shadow text-xs">管理 / 目標</button>
    </header>

    <div id="statusMsg" class="hidden fixed top-4 right-4 bg-gray-900/80 text-white px-4 py-2 rounded-full text-[10px] shadow-2xl z-50 flex items-center backdrop-blur-sm">
        <div class="w-1.5 h-1.5 bg-blue-400 rounded-full mr-2 loading-dot"></div>
        <span id="statusText">同步中...</span>
    </div>

    <div class="total-card text-white p-6 rounded-2xl shadow-xl mb-6 grid grid-cols-3 gap-2 text-center">
        <div>
            <p class="text-gray-400 text-[10px] uppercase">Calories</p>
            <p id="totalCal" class="text-xl font-bold text-yellow-400">0</p>
            <p class="text-[9px] text-gray-500">Target: <span id="tgCal">--</span></p>
        </div>
        <div>
            <p class="text-gray-400 text-[10px] uppercase">Protein (g)</p>
            <p id="totalPro" class="text-xl font-bold text-blue-400">0</p>
            <p class="text-[9px] text-gray-500">Target: <span id="tgPro">--</span></p>
        </div>
        <div>
            <p class="text-gray-400 text-[10px] uppercase">Carbs (g)</p>
            <p id="totalCarb" class="text-xl font-bold text-green-400">0</p>
            <p class="text-[9px] text-gray-500">Target: <span id="tgCarb">--</span></p>
        </div>
    </div>

    <div id="librarySection" class="hidden mb-6 bg-white p-5 rounded-xl shadow-md border border-blue-50">
        <div class="mb-6 pb-6 border-b">
            <h2 class="text-sm font-bold text-blue-600 mb-3">🎯 個人目標設定</h2>
            <div class="grid grid-cols-3 gap-3 mb-3">
                <input type="number" id="setCal" placeholder="熱量" class="border p-2 rounded text-xs w-full">
                <input type="number" id="setPro" placeholder="蛋白" class="border p-2 rounded text-xs w-full">
                <input type="number" id="setCarb" placeholder="碳水" class="border p-2 rounded text-xs w-full">
            </div>
            <button onclick="updateUserTargets()" class="w-full bg-blue-500 text-white py-2 rounded-lg text-xs font-bold">更新目標</button>
        </div>

        <h2 class="text-sm font-bold text-green-600 mb-3">🍎 雲端常用清單</h2>
        <div class="grid grid-cols-2 gap-2 mb-3">
            <input type="text" id="libName" placeholder="名稱" class="border p-2 rounded text-xs">
            <input type="number" id="libCal" placeholder="熱量" class="border p-2 rounded text-xs">
            <input type="number" id="libPro" placeholder="蛋白" class="border p-2 rounded text-xs">
            <input type="number" id="libCarb" placeholder="碳水" class="border p-2 rounded text-xs">
        </div>
        <button onclick="saveToLibrary()" class="w-full bg-green-500 text-white py-2 rounded-lg text-xs font-bold">儲存資料庫</button>
        <div class="mt-4 max-h-40 overflow-y-auto border-t pt-2" id="libraryList"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <script>
            ['早餐', '午餐', '下午茶', '晚餐'].forEach(meal => {
                document.write(`
                    <div class="bg-white p-4 rounded-xl shadow-sm meal-card border border-gray-50">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-bold text-gray-700">${meal}</h3>
                            <select onchange="addFromLibrary('${meal}', this)" class="border text-[10px] p-1 rounded bg-gray-50 outline-none w-24">
                                <option value="">+ 加入</option>
                            </select>
                        </div>
                        <ul id="list-${meal}" class="space-y-2 text-xs text-gray-600 min-h-[30px]"></ul>
                    </div>
                `);
            });
        </script>
    </div>

    <div class="mt-12 flex flex-col items-center gap-4">
        <button onclick="init()" class="bg-gray-200 text-gray-600 px-6 py-2 rounded-full text-xs font-bold hover:bg-gray-300">🔄 手動同步最新資料</button>
        <div class="flex gap-6">
            <button onclick="clearDailyLog()" class="text-gray-400 text-[10px] underline">清空今日</button>
            <button onclick="changeUID()" class="text-gray-400 text-[10px] underline">切換 ID</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwBpWyA2nE-1TRjQPGv7wqj2rW3OS2840vQph-Z2MC8MTscoK1cNNnzH_1bLWy5EK7ggw/exec"; 
    
    let UID = localStorage.getItem('muscle_tracker_uid');
    if (!UID) {
        UID = prompt("請輸入您的帳號 ID：") || "default";
        localStorage.setItem('muscle_tracker_uid', UID);
    }
    document.getElementById('displayUID').innerText = UID;

    let foodLibrary = [];
    let dailyLog = { '早餐': [], '午餐': [], '下午茶': [], '晚餐': [] };
    let userTargets = { cal: 2350, pro: 110, carb: 330 };

    function showStatus(msg) {
        const s = document.getElementById('statusMsg');
        document.getElementById('statusText').innerText = msg;
        s.classList.remove('hidden');
    }
    function hideStatus() {
        setTimeout(() => document.getElementById('statusMsg').classList.add('hidden'), 1500);
    }

    async function init() {
        // 1. 優先讀取本地快取
        const cachedLib = localStorage.getItem(`cache_${UID}_lib`);
        const cachedLog = localStorage.getItem(`cache_${UID}_log`);
        const cachedTgs = localStorage.getItem(`cache_${UID}_tgs`);
        
        if (cachedLib) foodLibrary = JSON.parse(cachedLib);
        if (cachedLog) dailyLog = JSON.parse(cachedLog);
        if (cachedTgs) userTargets = JSON.parse(cachedTgs);
        
        applyDataToUI();

        showStatus("雲端拉取中...");
        try {
            const response = await fetch(`${API_URL}?uid=${encodeURIComponent(UID)}`);
            const data = await response.json();
            
            // 2. 更新資料與快取
            foodLibrary = data.foodLibrary || [];
            dailyLog = data.dailyLog || { '早餐': [], '午餐': [], '下午茶': [], '晚餐': [] };
            userTargets = data.targets || userTargets;
            
            localStorage.setItem(`cache_${UID}_lib`, JSON.stringify(foodLibrary));
            localStorage.setItem(`cache_${UID}_log`, JSON.stringify(dailyLog));
            localStorage.setItem(`cache_${UID}_tgs`, JSON.stringify(userTargets));
            
            applyDataToUI();
            showStatus("已與電腦端同步");
        } catch (e) { 
            console.error(e);
            showStatus("同步失敗，檢查網路"); 
        } finally { hideStatus(); }
    }

    function applyDataToUI() {
        updateLibraryUI();
        renderDailyLog();
        updateTotals();
        document.getElementById('setCal').value = userTargets.cal;
        document.getElementById('setPro').value = userTargets.pro;
        document.getElementById('setCarb').value = userTargets.carb;
        document.getElementById('tgCal').innerText = userTargets.cal;
        document.getElementById('tgPro').innerText = userTargets.pro;
        document.getElementById('tgCarb').innerText = userTargets.carb;
    }

    function sync(type, data) {
        const cacheKeyMap = { 'saveLibrary': `cache_${UID}_lib`, 'saveLog': `cache_${UID}_log`, 'saveTargets': `cache_${UID}_tgs` };
        localStorage.setItem(cacheKeyMap[type], JSON.stringify(data));
        
        showStatus("雲端備份中...");
        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ type, data, uid: UID })
        }).then(() => { showStatus("已儲存"); hideStatus(); });
    }

    function updateUserTargets() {
        userTargets = {
            cal: parseInt(document.getElementById('setCal').value) || 0,
            pro: parseInt(document.getElementById('setPro').value) || 0,
            carb: parseInt(document.getElementById('setCarb').value) || 0
        };
        applyDataToUI();
        sync('saveTargets', userTargets);
    }

    function toggleLibrary() { document.getElementById('librarySection').classList.toggle('hidden'); }

    function saveToLibrary() {
        const name = document.getElementById('libName').value;
        const cal = parseFloat(document.getElementById('libCal').value) || 0;
        const pro = parseFloat(document.getElementById('libPro').value) || 0;
        const carb = parseFloat(document.getElementById('libCarb').value) || 0;
        if (!name) return;
        foodLibrary.push({ name, cal, pro, carb });
        updateLibraryUI();
        sync('saveLibrary', foodLibrary);
        ['libName', 'libCal', 'libPro', 'libCarb'].forEach(id => document.getElementById(id).value = '');
    }

    function updateLibraryUI() {
        const list = document.getElementById('libraryList');
        const selects = document.querySelectorAll('select');
        list.innerHTML = foodLibrary.map((f, i) => `
            <div class="flex justify-between items-center text-[10px] py-1 border-b">
                <span>${f.name} <span class="text-gray-400">(${f.cal}k/P:${f.pro}/C:${f.carb})</span></span>
                <button onclick="deleteLibItem(${i})" class="text-red-300">✕</button>
            </div>`).join('');
        const opts = foodLibrary.map((f, i) => `<option value="${i}">${f.name}</option>`).join('');
        selects.forEach(s => s.innerHTML = '<option value="">+ 加入</option>' + opts);
    }

    function deleteLibItem(i) { foodLibrary.splice(i, 1); updateLibraryUI(); sync('saveLibrary', foodLibrary); }

    function addFromLibrary(meal, select) {
        const idx = select.value;
        if (idx === "") return;
        dailyLog[meal].push({...foodLibrary[idx]});
        renderDailyLog(); updateTotals();
        sync('saveLog', dailyLog);
        select.value = "";
    }

    function renderDailyLog() {
        ['早餐', '午餐', '下午茶', '晚餐'].forEach(meal => {
            const list = document.getElementById(`list-${meal}`);
            list.innerHTML = (dailyLog[meal] || []).map((f, i) => `
                <li class="flex justify-between items-center bg-gray-50 p-2 rounded text-[11px]">
                    <span>${f.name} <span class="text-gray-400">(${f.cal}k)</span></span>
                    <button onclick="removeFromLog('${meal}', ${i})" class="text-gray-300 hover:text-red-500">✕</button>
                </li>`).join('');
        });
    }

    function removeFromLog(meal, i) { dailyLog[meal].splice(i, 1); renderDailyLog(); updateTotals(); sync('saveLog', dailyLog); }

    function updateTotals() {
        let c = 0, p = 0, b = 0;
        Object.values(dailyLog).flat().forEach(f => { c += f.cal; p += f.pro; b += f.carb; });
        document.getElementById('totalCal').innerText = Math.round(c);
        document.getElementById('totalPro').innerText = Math.round(p);
        document.getElementById('totalCarb').innerText = Math.round(b);
        document.getElementById('totalPro').className = (p >= userTargets.pro) ? "text-xl font-bold text-green-400" : "text-xl font-bold text-blue-400";
    }

    function clearDailyLog() { if(confirm('重置紀錄？')) { dailyLog = { '早餐': [], '午餐': [], '下午茶': [], '晚餐': [] }; renderDailyLog(); updateTotals(); sync('saveLog', dailyLog); } }

    function changeUID() { const n = prompt("輸入新 ID：", UID); if(n && n!==UID){ localStorage.clear(); localStorage.setItem('muscle_tracker_uid', n); location.reload(); } }

    init();
</script>
</body>
</html>
